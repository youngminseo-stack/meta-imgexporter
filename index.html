<!DOCTYPE html>
<html lang="ko">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Meta Ad Preview Exporter</title>
<link href="https://fonts.googleapis.com/css2?family=Syne:wght@400;600;700;800&family=IBM+Plex+Mono:wght@300;400;500&display=swap" rel="stylesheet">
<style>
:root{
  --bg:#07080a;--s1:#0f1013;--s2:#161820;--s3:#1e2028;
  --b1:#252830;--b2:#30333e;
  --tx:#eceef5;--tx2:#8c90a8;--tx3:#454860;
  --ac:#5b8cff;--ac2:#7aa3ff;--ac-d:rgba(91,140,255,.1);--ac-b:rgba(91,140,255,.22);
  --gr:#2ed88a;--gr-d:rgba(46,216,138,.08);
  --rd:#ff5e5e;--am:#ffb830;--am-d:rgba(255,184,48,.08);
  --r:8px;
}
*{margin:0;padding:0;box-sizing:border-box}
html,body{height:100%}
body{font-family:'IBM Plex Mono',monospace;background:var(--bg);color:var(--tx);font-size:12px;overflow:hidden}
.shell{display:flex;height:100vh}

.sb{width:258px;min-width:258px;background:var(--s1);border-right:1px solid var(--b1);display:flex;flex-direction:column;overflow:hidden}
.sb-head{padding:20px 16px 14px;border-bottom:1px solid var(--b1)}
.logo{font-family:'Syne',sans-serif;font-size:15px;font-weight:800;letter-spacing:-.4px}
.logo em{font-style:normal;color:var(--ac2)}
.logo-tag{font-size:9px;color:var(--tx3);letter-spacing:.1em;text-transform:uppercase;margin-top:3px}
.sb-body{flex:1;overflow-y:auto;padding:12px 10px;display:flex;flex-direction:column;gap:7px}
.fl{display:flex;flex-direction:column;gap:3px}
.fl-lbl{font-size:9px;letter-spacing:.1em;text-transform:uppercase;color:var(--tx3);padding:0 3px}
input[type=text],input[type=password]{width:100%;background:var(--s2);border:1px solid var(--b1);border-radius:var(--r);color:var(--tx);padding:7px 10px;font-size:11px;font-family:inherit;outline:none;transition:border .12s}
input:focus{border-color:var(--ac)}
input::placeholder{color:var(--tx3)}
.btn{width:100%;padding:8px 13px;border-radius:var(--r);border:none;font-size:11px;font-family:inherit;cursor:pointer;display:flex;align-items:center;justify-content:center;gap:6px;transition:all .12s}
.btn-p{background:var(--ac);color:#fff}.btn-p:hover{background:var(--ac2)}
.btn-g{background:var(--s2);color:var(--tx2);border:1px solid var(--b1)}.btn-g:hover{background:var(--s3);color:var(--tx)}
.btn-ex{background:rgba(46,216,138,.12);color:var(--gr);border:1px solid rgba(46,216,138,.25);font-weight:600;padding:10px}
.btn-ex:hover{background:rgba(46,216,138,.2)}
.btn:disabled{opacity:.35;cursor:not-allowed}
.btn-sm{width:auto;padding:5px 12px;font-size:10px}
.hr{height:1px;background:var(--b1)}
.stat{display:flex;align-items:center;gap:6px;padding:6px 10px;border-radius:var(--r);background:var(--s2);border:1px solid var(--b1);font-size:10px;color:var(--tx2)}
.dot{width:6px;height:6px;border-radius:50%;background:var(--b2);flex-shrink:0}
.dot.ok{background:var(--gr);box-shadow:0 0 6px var(--gr)}
.dot.err{background:var(--rd)}
.dot.spin{background:var(--am);animation:blink 1s infinite}
@keyframes blink{0%,100%{opacity:1}50%{opacity:.3}}

/* 내보내기 포맷 */
.fmt-box{background:var(--s2);border:1px solid var(--b1);border-radius:var(--r);padding:10px 12px;display:flex;flex-direction:column;gap:6px}
.fmt-title{font-size:9px;letter-spacing:.1em;text-transform:uppercase;color:var(--tx3);margin-bottom:2px}
.fmt-item{display:flex;align-items:center;gap:8px;cursor:pointer;padding:3px 0}
.fmt-item input[type=checkbox]{accent-color:var(--ac);cursor:pointer;flex-shrink:0}
.fmt-icon{font-size:12px;width:18px;text-align:center}
.fmt-label b{color:var(--tx);font-size:11px;display:block}
.fmt-label span{color:var(--tx3);font-size:9px}

.main{flex:1;display:flex;flex-direction:column;overflow:hidden}
.topbar{background:var(--s1);border-bottom:1px solid var(--b1);padding:0 20px;height:50px;display:flex;align-items:center;justify-content:space-between;flex-shrink:0}
.tb-l{display:flex;align-items:center;gap:10px}
.tb-title{font-family:'Syne',sans-serif;font-size:14px;font-weight:700}
.tb-sub{font-size:10px;color:var(--tx3)}
.tb-r{display:flex;gap:7px;align-items:center}
.content{flex:1;overflow-y:auto;padding:16px 20px}

.toolbar{display:flex;gap:7px;align-items:center;margin-bottom:12px;flex-wrap:wrap}
.ftag{padding:3px 10px;border-radius:20px;font-size:10px;cursor:pointer;border:1px solid var(--b1);background:var(--s2);color:var(--tx2);transition:all .1s}
.ftag.on{background:var(--ac-d);border-color:var(--ac-b);color:var(--ac2)}
.ftag.green{color:var(--gr);border-color:rgba(46,216,138,.25);background:var(--gr-d)}
.fsrch{flex:1;min-width:120px;max-width:220px;background:var(--s2);border:1px solid var(--b1);border-radius:20px;color:var(--tx);padding:4px 11px;font-size:11px;font-family:inherit;outline:none}
.fsrch:focus{border-color:var(--ac)}

.selbar{background:var(--ac-d);border:1px solid var(--ac-b);border-radius:var(--r);padding:8px 12px;display:none;align-items:center;gap:10px;margin-bottom:12px;font-size:11px;color:var(--ac2)}
.selbar.on{display:flex}

.tbl-info{font-size:10px;color:var(--tx3);margin-bottom:8px}
.tbl-wrap{overflow-x:auto;border-radius:var(--r);border:1px solid var(--b1);margin-bottom:12px}
table{width:100%;border-collapse:collapse;font-size:11px}
thead th{background:var(--s2);padding:9px 12px;text-align:left;color:var(--tx3);font-size:9px;letter-spacing:.08em;text-transform:uppercase;border-bottom:1px solid var(--b1);white-space:nowrap}
thead th:first-child{width:36px;text-align:center}
tbody tr{border-bottom:1px solid var(--b1);transition:background .1s;cursor:pointer}
tbody tr:last-child{border-bottom:none}
tbody tr:hover{background:var(--s2)}
tbody tr.sel{background:var(--ac-d)}
tbody td{padding:8px 12px;vertical-align:middle}
tbody td:first-child{text-align:center}
.chk{width:13px;height:13px;border-radius:3px;border:1px solid var(--b2);display:inline-flex;align-items:center;justify-content:center;font-size:8px}
.sel .chk{background:var(--ac);border-color:var(--ac);color:#fff}
.ad-name{color:var(--tx);font-weight:500;max-width:240px;white-space:nowrap;overflow:hidden;text-overflow:ellipsis}
.ad-set{color:var(--tx2);max-width:160px;white-space:nowrap;overflow:hidden;text-overflow:ellipsis}
.ad-camp{color:var(--tx3);max-width:140px;white-space:nowrap;overflow:hidden;text-overflow:ellipsis}
.thumb-cell{width:56px}
.thumb-cell img{width:44px;height:44px;object-fit:cover;border-radius:5px;display:block}
.thumb-cell .no-img{width:44px;height:44px;border-radius:5px;background:var(--s3);display:flex;align-items:center;justify-content:center;font-size:16px;color:var(--tx3)}

/* 더 불러오기 버튼 */
.load-more{display:flex;align-items:center;justify-content:center;gap:8px;padding:12px;border:1px dashed var(--b2);border-radius:var(--r);cursor:pointer;color:var(--tx3);font-size:11px;transition:all .15s;margin-bottom:12px}
.load-more:hover{border-color:var(--ac-b);color:var(--ac2);background:var(--ac-d)}

.empty{display:flex;flex-direction:column;align-items:center;justify-content:center;gap:10px;padding:60px 20px;text-align:center;color:var(--tx3)}
.empty-icon{font-size:36px;opacity:.3}
.empty-t{font-family:'Syne',sans-serif;font-size:15px;font-weight:700;color:var(--tx2)}
.empty-d{font-size:11px;line-height:1.7;max-width:240px}

.modal-wrap{display:none;position:fixed;inset:0;background:rgba(0,0,0,.82);backdrop-filter:blur(6px);z-index:200;align-items:center;justify-content:center}
.modal-wrap.on{display:flex}
.modal{background:var(--s1);border:1px solid var(--b1);border-radius:12px;padding:22px;width:440px;max-width:94vw;display:flex;flex-direction:column;gap:13px}
.modal-t{font-family:'Syne',sans-serif;font-size:15px;font-weight:700}
.modal-d{font-size:11px;color:var(--tx2);line-height:1.6}
.prog-row{display:flex;align-items:center;gap:10px}
.prog-wrap{flex:1;height:4px;background:var(--b1);border-radius:2px;overflow:hidden}
.prog-fill{height:100%;background:var(--gr);border-radius:2px;transition:width .3s}
.prog-pct{font-size:10px;color:var(--tx3);width:32px;text-align:right;flex-shrink:0}
.prog-msg{font-size:10px;color:var(--tx3);margin-top:3px;min-height:14px}

.sp-i{display:inline-block;width:11px;height:11px;border:2px solid var(--b2);border-top-color:var(--ac);border-radius:50%;animation:spin .5s linear infinite}
@keyframes spin{to{transform:rotate(360deg)}}
::-webkit-scrollbar{width:3px}
::-webkit-scrollbar-thumb{background:var(--b2);border-radius:2px}
</style>
</head>
<body>
<div class="shell">

<aside class="sb">
  <div class="sb-head">
    <div class="logo"><em>Ad Preview</em>↯Export</div>
    <div class="logo-tag">Meta Graph API v23.0 · Railway</div>
  </div>
  <div class="sb-body">
    <!-- Railway URL -->
    <div class="fl">
      <div class="fl-lbl">Railway 서버 URL</div>
      <input type="text" id="server-url" placeholder="https://xxxx.railway.app" style="font-size:10px;color:var(--ac2)"/>
    </div>
    <div class="hr"></div>
    <div class="fl">
      <div class="fl-lbl">Access Token</div>
      <input type="password" id="tok" placeholder="EAAxxxxxxxx..."/>
    </div>
    <div class="fl">
      <div class="fl-lbl">Ad Account ID</div>
      <input type="text" id="acc" placeholder="act_123456789"/>
    </div>
    <button class="btn btn-p" onclick="connect()"><span id="ci">→</span>&nbsp;연결 & 광고 불러오기</button>
    <div class="stat"><div class="dot" id="dot"></div><span id="stxt">연결 대기 중</span></div>
    <div class="hr"></div>

    <!-- 내보내기 포맷 -->
    <div class="fmt-box">
      <div class="fmt-title">내보내기 형식</div>
      <label class="fmt-item">
        <input type="checkbox" id="fmt-html" checked/>
        <span class="fmt-icon">🔗</span>
        <span class="fmt-label"><b>라이브 HTML</b><span>광고주 공유용</span></span>
      </label>
      <label class="fmt-item">
        <input type="checkbox" id="fmt-excel" checked/>
        <span class="fmt-icon">📊</span>
        <span class="fmt-label"><b>엑셀</b><span>소재명+이미지, 데이터용</span></span>
      </label>
      <label class="fmt-item">
        <input type="checkbox" id="fmt-ppt" checked/>
        <span class="fmt-icon">📑</span>
        <span class="fmt-label"><b>PPT</b><span>6개씩 슬라이드, 보고용</span></span>
      </label>
    </div>

    <button class="btn btn-ex" id="exbtn" onclick="startExport()" disabled>
      📸 선택한 형식으로 내보내기
    </button>
  </div>
</aside>

<main class="main">
  <div class="topbar">
    <div class="tb-l">
      <div class="tb-title">광고 목록</div>
      <div class="tb-sub" id="tsub">계정을 연결하세요</div>
    </div>
    <div class="tb-r">
      <button class="btn btn-g btn-sm" onclick="selAll()">✓ 전체선택</button>
      <button class="btn btn-g btn-sm" onclick="selNone()">✕ 해제</button>
    </div>
  </div>

  <div class="content">
    <div class="selbar" id="selbar">
      <span>✓</span>
      <span><b id="scnt">0</b>개 선택됨</span>
      <div style="flex:1"></div>
      <span style="font-size:10px;color:var(--tx3)">← 왼쪽에서 형식 선택 후 내보내기</span>
    </div>

    <div class="toolbar" id="toolbar" style="display:none">
      <div class="ftag on" onclick="setF('all',this)">전체</div>
      <div class="ftag" onclick="setF('ACTIVE',this)">🟢 ACTIVE</div>
      <div class="ftag" onclick="setF('PAUSED',this)">⏸ PAUSED</div>
      <div style="height:16px;width:1px;background:var(--b1)"></div>
      <div class="ftag green" onclick="selAll()">✓ 전체선택</div>
      <div class="ftag" onclick="selNone()">✕ 해제</div>
      <input class="fsrch" id="fsrch" placeholder="광고명 / 세트명 검색..." oninput="renderTable()"/>
    </div>

    <div class="tbl-info" id="tbl-info" style="display:none"></div>

    <div class="tbl-wrap" id="tbl-wrap" style="display:none">
      <table>
        <thead>
          <tr>
            <th><input type="checkbox" id="chk-all" onchange="toggleAll(this)" style="cursor:pointer"/></th>
            <th>썸네일</th>
            <th>광고명 (소재명)</th>
            <th>광고 세트</th>
            <th>캠페인</th>
            <th>상태</th>
          </tr>
        </thead>
        <tbody id="tbody"></tbody>
      </table>
    </div>

    <!-- 더 불러오기 -->
    <div class="load-more" id="load-more" style="display:none" onclick="loadMore()">
      <span id="load-more-icon">↓</span>
      <span id="load-more-txt">30개 더 불러오기</span>
    </div>

    <div class="empty" id="empty">
      <div class="empty-icon">📋</div>
      <div class="empty-t">광고가 없습니다</div>
      <div class="empty-d">계정을 연결하면<br>최근 광고 30개를 바로 불러옵니다.</div>
    </div>
  </div>
</main>
</div>

<!-- Modal -->
<div class="modal-wrap" id="mwrap">
  <div class="modal">
    <div class="modal-t" id="mt">처리 중...</div>
    <div class="modal-d" id="md"></div>
    <div>
      <div class="prog-row">
        <div class="prog-wrap"><div class="prog-fill" id="pf" style="width:0%"></div></div>
        <div class="prog-pct" id="pp">0%</div>
      </div>
      <div class="prog-msg" id="pm"></div>
    </div>
    <button class="btn btn-g" id="mcls" onclick="closeModal()" style="display:none;margin-top:4px">닫기</button>
  </div>
</div>

<script>
const W=window, g=id=>document.getElementById(id);
let ads=[], sel=new Set(), curF='all', nextCursor=null, loading=false;

// ── Connect & 첫 로드 ──
async function connect(){
  const tok=g('tok').value.trim(), acc=g('acc').value.trim();
  if(!tok||!acc) return alert('토큰과 계정 ID를 입력하세요.');
  const aid=acc.startsWith('act_')?acc:'act_'+acc;
  setDot('spin','광고 불러오는 중...'); setIcon('ci','spin');
  W.tok=tok; W.aid=aid;
  ads=[]; sel.clear(); nextCursor=null;
  g('tbl-wrap').style.display='none';
  g('toolbar').style.display='none';
  g('tbl-info').style.display='none';
  g('load-more').style.display='none';
  g('empty').style.display='none';
  updSel();
  await fetchAds(true);
  setIcon('ci','→');
}

async function fetchAds(reset=false){
  if(loading) return;
  loading=true;
  if(!reset){
    g('load-more-icon').innerHTML='<span class="sp-i"></span>';
    g('load-more-txt').textContent='불러오는 중...';
  }
  try{
    // 계정 단위로 광고 직접 조회 (캠페인 트리 없이)
    let url=`https://graph.facebook.com/v23.0/${W.aid}/ads?fields=id,name,status,adset_id,adset{name},campaign_id,campaign{name},creative{thumbnail_url,image_url,object_story_spec}&limit=30`;
    if(nextCursor) url+=`&after=${nextCursor}`;
    url+=`&access_token=${W.tok}`;

    const r=await fetch(url);
    const d=await r.json();
    if(d.error) throw new Error(d.error.message);

    const newAds=(d.data||[]).map(ad=>({
      id:ad.id,
      name:ad.name,
      status:ad.status,
      adsetName:ad.adset?.name||'',
      campName:ad.campaign?.name||'',
      thumbUrl:getThumb(ad.creative),
    }));

    ads=ads.concat(newAds);
    nextCursor=d.paging?.cursors?.after||null;
    const hasMore=!!d.paging?.next;

    g('toolbar').style.display='flex';
    g('tbl-info').style.display='block';
    g('tbl-wrap').style.display='block';
    g('load-more').style.display=hasMore?'flex':'none';
    if(hasMore){
      g('load-more-icon').textContent='↓';
      g('load-more-txt').textContent='30개 더 불러오기';
    }
    renderTable();
    setDot('ok',`연결됨 · 광고 ${ads.length}개 로드${hasMore?' (더 있음)':''}`);
    g('tsub').textContent=`광고 ${ads.length}개${hasMore?' · 더 있음':''}`;

    if(!ads.length){
      g('empty').style.display='flex';
      g('tbl-wrap').style.display='none';
    }
  }catch(er){
    setDot('err','오류: '+er.message.slice(0,40));
    alert('광고 불러오기 실패: '+er.message);
    g('empty').style.display='flex';
  }finally{
    loading=false;
  }
}

async function loadMore(){
  if(!nextCursor||loading) return;
  await fetchAds(false);
}

function getThumb(cr){
  if(!cr) return '';
  if(cr.thumbnail_url) return cr.thumbnail_url;
  if(cr.image_url) return cr.image_url;
  try{
    const s=cr.object_story_spec;
    return s?.video_data?.image_url||s?.link_data?.picture||s?.link_data?.image_url||'';
  }catch{return '';}
}

// ── Table ──
function setF(f,el){curF=f;document.querySelectorAll('.ftag').forEach(x=>x.classList.remove('on'));el.classList.add('on');renderTable();}
function renderTable(){
  const q=(g('fsrch')?.value||'').toLowerCase();
  let list=ads;
  if(curF!=='all') list=list.filter(a=>a.status===curF);
  if(q) list=list.filter(a=>a.name.toLowerCase().includes(q)||a.adsetName.toLowerCase().includes(q)||a.campName.toLowerCase().includes(q));
  g('tbl-info').textContent=`${list.length}개 표시 (전체 로드: ${ads.length}개)`;
  const tbody=g('tbody');
  if(!list.length){tbody.innerHTML=`<tr><td colspan="6" style="padding:30px;text-align:center;color:var(--tx3)">조건에 맞는 광고가 없습니다.</td></tr>`;return;}
  tbody.innerHTML=list.map(a=>{
    const s=sel.has(a.id);
    const sClass=a.status==='ACTIVE'?'sa':a.status==='PAUSED'?'sp':'so';
    const sbgs={'sa':'var(--gr-d)','sp':'var(--am-d)','so':'var(--s3)'};
    const scols={'sa':'var(--gr)','sp':'var(--am)','so':'var(--tx3)'};
    const thumb=a.thumbUrl
      ?`<img src="${a.thumbUrl}" onerror="this.style.display='none';this.nextSibling.style.display='flex'"/><div class="no-img" style="display:none">🖼</div>`
      :`<div class="no-img">🖼</div>`;
    return `<tr class="${s?'sel':''}" onclick="togRow('${a.id}')">
      <td><div class="chk">${s?'✓':''}</div></td>
      <td class="thumb-cell">${thumb}</td>
      <td><div class="ad-name" title="${a.name}">${a.name}</div></td>
      <td><div class="ad-set" title="${a.adsetName}">${a.adsetName}</div></td>
      <td><div class="ad-camp" title="${a.campName}">${a.campName}</div></td>
      <td><span style="font-size:8px;padding:2px 6px;border-radius:10px;text-transform:uppercase;background:${sbgs[sClass]};color:${scols[sClass]}">${a.status}</span></td>
    </tr>`;
  }).join('');
}
function togRow(id){sel.has(id)?sel.delete(id):sel.add(id);renderTable();updSel();}
function selAll(){ads.forEach(a=>sel.add(a.id));renderTable();updSel();}
function selNone(){sel.clear();renderTable();updSel();}
function toggleAll(cb){cb.checked?selAll():selNone();}
function updSel(){
  const n=sel.size;
  g('scnt').textContent=n;
  g('selbar').classList.toggle('on',n>0);
  g('exbtn').disabled=n===0;
}

// ── Export → Railway ──
async function startExport(){
  const serverUrl=(g('server-url').value||'').trim().replace(/\/$/,'');
  if(!serverUrl) return alert('Railway 서버 URL을 입력하세요.');
  const formats=[];
  if(g('fmt-html').checked) formats.push('html');
  if(g('fmt-excel').checked) formats.push('excel');
  if(g('fmt-ppt').checked) formats.push('ppt');
  if(!formats.length) return alert('형식을 하나 이상 선택하세요.');
  const list=ads.filter(a=>sel.has(a.id));
  if(!list.length) return alert('광고를 선택하세요.');

  g('mwrap').classList.add('on');
  g('mt').textContent='📸 서버에서 처리 중...';
  g('md').textContent=`Railway 서버에서 ${list.length}개 광고를 캡처합니다.\n수 분이 걸릴 수 있어요.`;
  g('mcls').style.display='none';
  setProg(10,'서버로 요청 전송 중...');

  let prog=10;
  const iv=setInterval(()=>{if(prog<88){prog+=0.4;setProg(prog,`서버 처리 중... (${list.length}개 캡처)`);}},1000);

  try{
    const resp=await fetch(`${serverUrl}/export`,{
      method:'POST', headers:{'Content-Type':'application/json'},
      body:JSON.stringify({
        token:W.tok, formats,
        ads:list.map(a=>({id:a.id,name:a.name,status:a.status,adsetName:a.adsetName,campName:a.campName,thumbUrl:a.thumbUrl}))
      })
    });
    clearInterval(iv);
    if(!resp.ok){const e=await resp.json().catch(()=>({error:'서버 오류'}));throw new Error(e.error||`HTTP ${resp.status}`);}
    setProg(95,'파일 다운로드 중...');
    const blob=await resp.blob();
    const a2=document.createElement('a');
    const ts=new Date().toISOString().slice(0,16).replace('T','_').replace(':','');
    a2.href=URL.createObjectURL(blob); a2.download=`meta_export_${ts}.zip`; a2.click();
    setProg(100,'✅ 완료!');
    g('mt').textContent='✅ 다운로드 완료!';
    g('md').textContent=`${list.length}개 광고가 ZIP으로 저장됐습니다.`;
    g('mcls').style.display='block';
  }catch(er){
    clearInterval(iv);
    g('mt').textContent='❌ 오류';
    g('md').textContent=`오류: ${er.message}`;
    g('mcls').style.display='block'; setProg(0,'');
  }
}

function closeModal(){g('mwrap').classList.remove('on');}
function setProg(pct,msg){g('pf').style.width=pct+'%';g('pp').textContent=Math.round(pct)+'%';g('pm').textContent=msg;}
function setDot(cls,msg){g('dot').className='dot '+cls;g('stxt').textContent=msg;}
function setIcon(id,v){g(id).innerHTML=v==='spin'?'<span class="sp-i"></span>':v;}
function sleep(ms){return new Promise(r=>setTimeout(r,ms));}
</script>
