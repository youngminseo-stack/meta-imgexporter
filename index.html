<!DOCTYPE html>
<html lang="ko">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Meta Creative Exporter</title>
<link href="https://fonts.googleapis.com/css2?family=Syne:wght@400;600;700;800&family=IBM+Plex+Mono:wght@300;400;500&display=swap" rel="stylesheet">
<style>
:root {
  --bg:#07080a; --s1:#0f1013; --s2:#161820; --s3:#1e2028;
  --b1:#252830; --b2:#30333e; --b3:#3d4050;
  --tx:#eceef5; --tx2:#8c90a8; --tx3:#454860;
  --ac:#5b8cff; --ac2:#7aa3ff; --ac-d:rgba(91,140,255,.1); --ac-b:rgba(91,140,255,.22);
  --gr:#2ed88a; --gr-d:rgba(46,216,138,.08);
  --rd:#ff5e5e; --am:#ffb830; --am-d:rgba(255,184,48,.08);
  --radius:8px;
}
*{margin:0;padding:0;box-sizing:border-box}
html,body{height:100%}
body{font-family:'IBM Plex Mono',monospace;background:var(--bg);color:var(--tx);font-size:12px;overflow:hidden}

/* ── Layout ── */
.shell{display:flex;height:100vh}

/* ── Sidebar ── */
.sb{width:252px;min-width:252px;background:var(--s1);border-right:1px solid var(--b1);display:flex;flex-direction:column;overflow:hidden}
.sb-head{padding:20px 16px 14px;border-bottom:1px solid var(--b1)}
.logo{font-family:'Syne',sans-serif;font-size:16px;font-weight:800;letter-spacing:-.4px;line-height:1.1}
.logo em{font-style:normal;color:var(--ac2)}
.logo-tag{font-size:9px;color:var(--tx3);letter-spacing:.1em;text-transform:uppercase;margin-top:3px}
.sb-body{flex:1;overflow-y:auto;padding:12px 10px;display:flex;flex-direction:column;gap:7px}

/* fields */
.fl{display:flex;flex-direction:column;gap:3px}
.fl-lbl{font-size:9px;letter-spacing:.1em;text-transform:uppercase;color:var(--tx3);padding:0 3px}
input[type=text],input[type=password]{width:100%;background:var(--s2);border:1px solid var(--b1);border-radius:var(--radius);color:var(--tx);padding:7px 10px;font-size:11px;font-family:inherit;outline:none;transition:border .12s}
input:focus{border-color:var(--ac)}
input::placeholder{color:var(--tx3)}

/* buttons */
.btn{width:100%;padding:8px 13px;border-radius:var(--radius);border:none;font-size:11px;font-family:inherit;cursor:pointer;display:flex;align-items:center;justify-content:center;gap:6px;transition:all .12s;letter-spacing:.01em}
.btn-p{background:var(--ac);color:#fff}
.btn-p:hover{background:var(--ac2)}
.btn-g{background:var(--s2);color:var(--tx2);border:1px solid var(--b1)}
.btn-g:hover{background:var(--s3);color:var(--tx)}
.btn-ex{background:rgba(46,216,138,.1);color:var(--gr);border:1px solid rgba(46,216,138,.22)}
.btn-ex:hover{background:rgba(46,216,138,.18)}
.btn:disabled{opacity:.35;cursor:not-allowed}
.btn-sm{width:auto;padding:5px 12px;font-size:10px}

.hr{height:1px;background:var(--b1);margin:1px 0}

/* status */
.stat{display:flex;align-items:center;gap:6px;padding:6px 10px;border-radius:var(--radius);background:var(--s2);border:1px solid var(--b1);font-size:10px;color:var(--tx2)}
.dot{width:6px;height:6px;border-radius:50%;background:var(--b2);flex-shrink:0;transition:all .2s}
.dot.ok{background:var(--gr);box-shadow:0 0 6px var(--gr)}
.dot.err{background:var(--rd)}
.dot.spin{background:var(--am);animation:blink 1s infinite}
@keyframes blink{0%,100%{opacity:1}50%{opacity:.3}}

/* tree */
.tree-lbl{font-size:9px;letter-spacing:.1em;text-transform:uppercase;color:var(--tx3);padding:5px 3px 2px}
.ti{border:1px solid var(--b1);border-radius:var(--radius);overflow:hidden;margin-bottom:3px}
.th{display:flex;align-items:center;gap:6px;padding:7px 8px;cursor:pointer;background:var(--s2);transition:background .1s;font-size:11px}
.th:hover{background:var(--s3)}
.chev{font-size:8px;color:var(--tx3);transition:transform .15s;flex-shrink:0}
.chev.o{transform:rotate(90deg)}
.tn{flex:1;color:var(--tx2);white-space:nowrap;overflow:hidden;text-overflow:ellipsis}
.al{display:none;padding:3px 0 3px 12px;background:var(--s1)}
.al.o{display:block}
.ar{display:flex;align-items:center;gap:6px;padding:5px 7px;border-radius:5px;cursor:pointer;margin:1px 0;transition:background .1s}
.ar:hover{background:var(--s2)}
.ar.active{background:var(--ac-d)}
.ar.active .an{color:var(--ac2)}
.ach{width:11px;height:11px;border-radius:3px;border:1px solid var(--b2);flex-shrink:0;display:flex;align-items:center;justify-content:center;font-size:7px}
.ar.active .ach{background:var(--ac);border-color:var(--ac);color:#fff}
.an{font-size:10px;color:var(--tx2);flex:1;white-space:nowrap;overflow:hidden;text-overflow:ellipsis}
.sb-s{font-size:8px;padding:1px 5px;border-radius:10px;text-transform:uppercase;letter-spacing:.04em;flex-shrink:0}
.sa{background:var(--gr-d);color:var(--gr)}
.sp{background:var(--am-d);color:var(--am)}
.so{background:var(--s3);color:var(--tx3)}

/* ── Main ── */
.main{flex:1;display:flex;flex-direction:column;overflow:hidden}
.topbar{background:var(--s1);border-bottom:1px solid var(--b1);padding:0 20px;height:50px;display:flex;align-items:center;justify-content:space-between;flex-shrink:0}
.tb-l{display:flex;align-items:center;gap:10px}
.tb-title{font-family:'Syne',sans-serif;font-size:14px;font-weight:700}
.tb-sub{font-size:10px;color:var(--tx3)}
.tb-r{display:flex;gap:7px;align-items:center}

.content{flex:1;overflow-y:auto;padding:16px 20px}

/* selection bar */
.selbar{background:var(--ac-d);border:1px solid var(--ac-b);border-radius:var(--radius);padding:8px 12px;display:none;align-items:center;gap:10px;margin-bottom:12px;font-size:11px;color:var(--ac2);animation:fadein .2s}
.selbar.on{display:flex}
@keyframes fadein{from{opacity:0;transform:translateY(-4px)}to{opacity:1;transform:translateY(0)}}

/* filter */
.fbar{display:flex;gap:6px;align-items:center;margin-bottom:12px;flex-wrap:wrap}
.ftag{padding:3px 10px;border-radius:20px;font-size:10px;cursor:pointer;border:1px solid var(--b1);background:var(--s2);color:var(--tx2);transition:all .1s}
.ftag.on{background:var(--ac-d);border-color:var(--ac-b);color:var(--ac2)}
.fsrch{flex:1;min-width:100px;max-width:180px;background:var(--s2);border:1px solid var(--b1);border-radius:20px;color:var(--tx);padding:4px 11px;font-size:11px;font-family:inherit;outline:none}
.fsrch:focus{border-color:var(--ac)}

.ginfo{font-size:10px;color:var(--tx3);margin-bottom:9px}

/* grid */
.grid{display:grid;grid-template-columns:repeat(auto-fill,minmax(145px,1fr));gap:9px}
.cc{background:var(--s1);border:1.5px solid var(--b1);border-radius:9px;overflow:hidden;cursor:pointer;transition:all .15s;position:relative}
.cc:hover{border-color:var(--b2);transform:translateY(-1px)}
.cc.sel{border-color:var(--ac)}
.cc.sel .cov{display:flex}
.cthumb{width:100%;aspect-ratio:1;object-fit:cover;display:block;background:var(--s2)}
.cph{width:100%;aspect-ratio:1;background:var(--s2);display:flex;align-items:center;justify-content:center;flex-direction:column;gap:3px;color:var(--tx3);font-size:9px}
.cph span{font-size:24px}
.cbody{padding:7px 9px;border-top:1px solid var(--b1)}
.cname{font-size:10px;color:var(--tx2);white-space:nowrap;overflow:hidden;text-overflow:ellipsis;margin-bottom:2px}
.cmeta{font-size:9px;color:var(--tx3)}
.cov{display:none;position:absolute;inset:0;background:rgba(91,140,255,.14);align-items:flex-start;justify-content:flex-end;padding:7px}
.cck{width:18px;height:18px;border-radius:50%;background:var(--ac);color:#fff;display:flex;align-items:center;justify-content:center;font-size:10px;font-weight:700}
.ctag{position:absolute;bottom:40px;left:7px;font-size:8px;padding:2px 6px;border-radius:10px;background:rgba(0,0,0,.65);color:#fff;backdrop-filter:blur(3px)}

/* empty */
.empty{display:flex;flex-direction:column;align-items:center;justify-content:center;gap:10px;padding:70px 20px;text-align:center;color:var(--tx3)}
.empty-icon{font-size:36px;opacity:.3}
.empty-t{font-family:'Syne',sans-serif;font-size:15px;font-weight:700;color:var(--tx2)}
.empty-d{font-size:11px;line-height:1.7;max-width:220px}

/* progress modal */
.modal-wrap{display:none;position:fixed;inset:0;background:rgba(0,0,0,.8);backdrop-filter:blur(6px);z-index:200;align-items:center;justify-content:center}
.modal-wrap.on{display:flex}
.modal{background:var(--s1);border:1px solid var(--b1);border-radius:12px;padding:22px;width:400px;max-width:94vw;display:flex;flex-direction:column;gap:13px}
.modal-t{font-family:'Syne',sans-serif;font-size:15px;font-weight:700}
.modal-d{font-size:11px;color:var(--tx2);line-height:1.6}
.prog-wrap{height:4px;background:var(--b1);border-radius:2px;overflow:hidden}
.prog-fill{height:100%;background:var(--gr);border-radius:2px;transition:width .3s}
.prog-row{display:flex;align-items:center;gap:10px}
.prog-pct{font-size:10px;color:var(--tx3);width:32px;text-align:right;flex-shrink:0}
.prog-msg{font-size:10px;color:var(--tx3);margin-top:2px}

/* spinner inline */
.sp-i{display:inline-block;width:11px;height:11px;border:2px solid var(--b2);border-top-color:var(--ac);border-radius:50%;animation:spin .5s linear infinite}
@keyframes spin{to{transform:rotate(360deg)}}

::-webkit-scrollbar{width:3px}
::-webkit-scrollbar-thumb{background:var(--b2);border-radius:2px}
</style>
</head>
<body>
<div class="shell">

<!-- ── Sidebar ── -->
<aside class="sb">
  <div class="sb-head">
    <div class="logo"><em>Creative</em>↯Export</div>
    <div class="logo-tag">Meta Graph API v23.0</div>
  </div>
  <div class="sb-body">

    <div class="fl">
      <div class="fl-lbl">Access Token</div>
      <input type="password" id="tok" placeholder="EAAxxxxxxxx..."/>
    </div>
    <div class="fl">
      <div class="fl-lbl">Ad Account ID</div>
      <input type="text" id="acc" placeholder="act_123456789"/>
    </div>
    <button class="btn btn-p" onclick="connect()"><span id="ci">→</span>&nbsp;연결 & 캠페인 불러오기</button>

    <div class="stat"><div class="dot" id="dot"></div><span id="stxt">연결 대기 중</span></div>
    <div class="hr"></div>

    <div id="tree">
      <div class="tree-lbl">캠페인 / 광고 세트</div>
      <div style="padding:7px 3px;font-size:10px;color:var(--tx3)">계정 연결 후 표시됩니다.</div>
    </div>

    <div class="hr"></div>
    <button class="btn btn-g" id="lbtn" onclick="loadCreatives()" disabled><span id="li">↓</span>&nbsp;선택 세트 소재 불러오기</button>
  </div>
</aside>

<!-- ── Main ── -->
<main class="main">
  <div class="topbar">
    <div class="tb-l">
      <div class="tb-title">소재 라이브러리</div>
      <div class="tb-sub" id="tsub">광고 세트를 선택하세요</div>
    </div>
    <div class="tb-r">
      <button class="btn btn-g btn-sm" onclick="selAll()">전체 선택</button>
      <button class="btn btn-g btn-sm" onclick="selNone()">선택 해제</button>
      <button class="btn btn-ex btn-sm" id="exbtn" onclick="startExport()" disabled>📥 리포트 다운로드</button>
    </div>
  </div>

  <div class="content">
    <div class="selbar" id="selbar">
      <span>✓</span>
      <span><b id="scnt">0</b>개 소재 선택됨</span>
      <div style="flex:1"></div>
      <span style="font-size:10px;color:var(--tx3)">→ 리포트 다운로드 버튼</span>
    </div>

    <div class="fbar" id="fbar" style="display:none">
      <div class="ftag on" onclick="setF('all',this)">전체</div>
      <div class="ftag" onclick="setF('image',this)">🖼 이미지</div>
      <div class="ftag" onclick="setF('video',this)">🎬 영상</div>
      <input class="fsrch" id="fsrch" placeholder="소재명 검색..." oninput="renderGrid()"/>
    </div>
    <div class="ginfo" id="ginfo" style="display:none"></div>
    <div class="grid" id="grid"></div>

    <div class="empty" id="empty">
      <div class="empty-icon">🗂</div>
      <div class="empty-t">소재가 없습니다</div>
      <div class="empty-d">광고 계정을 연결하고<br>광고 세트를 선택한 뒤<br>소재를 불러오세요.</div>
    </div>
  </div>
</main>
</div>

<!-- Export progress modal -->
<div class="modal-wrap" id="mwrap">
  <div class="modal">
    <div class="modal-t" id="mt">📊 리포트 생성 중...</div>
    <div class="modal-d" id="md">이미지를 가져오고 HTML 리포트를 만들고 있습니다.<br>창을 닫지 마세요.</div>
    <div>
      <div class="prog-row">
        <div class="prog-wrap" style="flex:1"><div class="prog-fill" id="pf" style="width:0%"></div></div>
        <div class="prog-pct" id="pp">0%</div>
      </div>
      <div class="prog-msg" id="pm"></div>
    </div>
    <button class="btn btn-g" id="mcls" onclick="closeModal()" style="display:none;margin-top:4px">닫기</button>
  </div>
</div>

<script>
// ── state ──
let items=[], sel=new Set(), adsets=new Map(), curF='all';

// ── connect ──
async function connect(){
  const tok=g('tok').value.trim(), acc=g('acc').value.trim();
  if(!tok||!acc) return alert('토큰과 계정 ID를 입력하세요.');
  const aid=acc.startsWith('act_')?acc:'act_'+acc;
  setDot('spin','연결 중...');setIcon('ci','spin');
  try{
    const d=await api(`/${aid}/campaigns?fields=id,name,status&limit=100`,tok);
    W.tok=tok; W.aid=aid; W.camps=d.data||[];
    setDot('ok',`연결됨 · 캠페인 ${W.camps.length}개`);
    await buildTree();
  }catch(e){setDot('err','연결 실패: '+e.message.slice(0,40));alert(e.message);}
  finally{setIcon('ci','→');}
}

async function buildTree(){
  const t=g('tree');
  t.innerHTML='<div class="tree-lbl">캠페인 / 광고 세트</div><div style="padding:7px 3px;font-size:10px;color:var(--tx3);display:flex;gap:5px;align-items:center"><span class="sp-i"></span>불러오는 중...</div>';
  const rs=await Promise.all(W.camps.map(c=>api(`/${c.id}/adsets?fields=id,name,status&limit=100`,W.tok).catch(()=>({data:[]}))));
  t.innerHTML='<div class="tree-lbl">캠페인 / 광고 세트</div>';
  W.camps.forEach((c,i)=>{
    const as=rs[i].data||[], el=document.createElement('div');
    el.className='ti';
    el.innerHTML=`<div class="th" onclick="tog(this)"><span class="chev">▶</span><span class="tn" title="${c.name}">${c.name}</span><span class="sb-s ${sc(c.status)}">${c.status}</span></div>
    <div class="al">${as.map(a=>`<div class="ar" data-id="${a.id}" data-n="${e(a.name)}" data-cid="${c.id}" data-cn="${e(c.name)}" onclick="togAs(this)"><div class="ach"></div><span class="an" title="${a.name}">${a.name}</span><span class="sb-s ${sc(a.status)}">${a.status}</span></div>`).join('')}${!as.length?'<div style="padding:6px 8px;font-size:10px;color:var(--tx3)">광고 세트 없음</div>':''}</div>`;
    t.appendChild(el);
  });
}

function tog(el){el.querySelector('.chev').classList.toggle('o');el.nextElementSibling.classList.toggle('o');}
function togAs(el){
  const {id,n,cid,cn}=el.dataset, name=d(n), cname=d(cn);
  if(adsets.has(id)){adsets.delete(id);el.classList.remove('active');el.querySelector('.ach').textContent='';}
  else{adsets.set(id,{id,name,cid,cname});el.classList.add('active');el.querySelector('.ach').textContent='✓';}
  g('lbtn').disabled=!adsets.size;
  g('tsub').textContent=adsets.size?`${adsets.size}개 광고 세트 선택됨`:'광고 세트를 선택하세요';
}

// ── load creatives ──
async function loadCreatives(){
  if(!adsets.size) return alert('광고 세트를 선택하세요.');
  setIcon('li','spin');g('lbtn').disabled=true;
  g('empty').style.display='none';g('grid').innerHTML='';
  g('fbar').style.display='none';g('ginfo').style.display='none';
  items=[];sel.clear();updSel();
  try{
    const ids=[...adsets.keys()];
    // 진행 상태 표시
    setDot('spin','소재 불러오는 중...');
    const [imgAll,vidAll,...adAllArr]=await Promise.all([
      apiAll(`/${W.aid}/adimages?fields=id,hash,name,url_128,width,height,created_time&limit=200`,W.tok),
      apiAll(`/${W.aid}/advideos?fields=id,title,picture,length,created_time&limit=200`,W.tok),
      ...ids.map(id=>apiAll(`/${id}/ads?fields=id,name,creative{id,name,image_hash,video_id,thumbnail_url}&limit=200`,W.tok).catch(()=>[]))
    ]);
    const imap={},vmap={};
    imgAll.forEach(x=>imap[x.hash]=x);
    vidAll.forEach(x=>vmap[x.id]=x);
    const seen=new Set();
    ids.forEach((id,i)=>{
      const as=adsets.get(id);
      (adAllArr[i]||[]).forEach(ad=>{
        const cr=ad.creative; if(!cr) return;
        if(cr.image_hash&&imap[cr.image_hash]){
          const img=imap[cr.image_hash], uid='i_'+cr.image_hash;
          if(seen.has(uid)) return; seen.add(uid);
          items.push({id:uid,type:'image',name:cr.name||img.name||cr.image_hash,
            hash:cr.image_hash,fullHash:img.id||cr.image_hash,
            thumbUrl:img.url_128||'',w:img.width,h:img.height,
            created:img.created_time||'',
            adsetName:as.name,campName:as.cname});
        } else if(cr.video_id&&vmap[cr.video_id]){
          const vid=vmap[cr.video_id], uid='v_'+cr.video_id;
          if(seen.has(uid)) return; seen.add(uid);
          const dur=vid.length?`${Math.floor(vid.length/60)}:${String(vid.length%60).padStart(2,'0')}`:'-';
          items.push({id:uid,type:'video',name:cr.name||vid.title||cr.video_id,
            hash:null,videoId:cr.video_id,
            thumbUrl:cr.thumbnail_url||vid.picture||'',duration:dur,
            created:vid.created_time||'',
            adsetName:as.name,campName:as.cname});
        }
      });
    });
    g('fbar').style.display='flex';g('ginfo').style.display='block';
    renderGrid();
    if(!items.length){g('empty').style.display='flex';g('empty').querySelector('.empty-d').textContent='선택한 광고 세트에 소재가 없습니다.';}
  }catch(er){alert('소재 불러오기 실패: '+er.message);g('empty').style.display='flex';}
  finally{setIcon('li','↓');g('lbtn').disabled=false;setDot('ok',`연결됨 · 소재 ${items.length}개 로드`);}
}

// ── grid ──
function setF(t,el){curF=t;document.querySelectorAll('.ftag').forEach(x=>x.classList.remove('on'));el.classList.add('on');renderGrid();}
function renderGrid(){
  const q=(g('fsrch')?.value||'').toLowerCase();
  let list=items;
  if(curF!=='all') list=list.filter(c=>c.type===curF);
  if(q) list=list.filter(c=>c.name.toLowerCase().includes(q));
  g('ginfo').textContent=`${list.length}개 소재 (전체 ${items.length}개)`;
  const gr=g('grid');
  if(!list.length){gr.innerHTML='<div style="grid-column:1/-1;padding:40px 0;text-align:center;color:var(--tx3)">조건에 맞는 소재가 없습니다.</div>';return;}
  gr.innerHTML=list.map(c=>{
    const s=sel.has(c.id), meta=c.type==='image'?(c.w?`${c.w}×${c.h}`:''):(c.duration||'');
    const th=c.thumbUrl?`<img class="cthumb" src="${c.thumbUrl}" onerror="this.style.display='none';this.nextElementSibling.style.display='flex'"/><div class="cph" style="display:none"><span>${c.type==='image'?'🖼':'🎬'}</span></div>`:`<div class="cph"><span>${c.type==='image'?'🖼':'🎬'}</span></div>`;
    return `<div class="cc ${s?'sel':''}" id="c${c.id}" onclick="togItem('${c.id}')">${th}<div class="ctag">${c.type==='image'?'IMG':'VID'}</div><div class="cov"><div class="cck">✓</div></div><div class="cbody"><div class="cname" title="${c.name}">${c.name}</div><div class="cmeta">${meta}</div></div></div>`;
  }).join('');
}
function togItem(id){sel.has(id)?sel.delete(id):sel.add(id);document.getElementById('c'+id)?.classList.toggle('sel',sel.has(id));updSel();}
function selAll(){items.forEach(c=>sel.add(c.id));renderGrid();updSel();}
function selNone(){sel.clear();renderGrid();updSel();}
function updSel(){const n=sel.size;g('scnt').textContent=n;g('selbar').classList.toggle('on',n>0);g('exbtn').disabled=n===0;}

// ── export ──
function startExport(){
  if(!sel.size) return;
  g('mwrap').classList.add('on');
  g('mt').textContent='📊 리포트 생성 중...';
  g('md').textContent='이미지를 가져오고 HTML 리포트를 만들고 있습니다. 창을 닫지 마세요.';
  g('mcls').style.display='none';
  setProg(0,'준비 중...');
  doExport();
}
function closeModal(){g('mwrap').classList.remove('on');}
function setProg(pct,msg){g('pf').style.width=pct+'%';g('pp').textContent=Math.round(pct)+'%';g('pm').textContent=msg;}

async function doExport(){
  const list=items.filter(c=>sel.has(c.id));
  const total=list.length;

  // 이미지 base64 수집
  const imgMap={};
  for(let i=0;i<list.length;i++){
    const c=list[i];
    setProg(i/total*80,`이미지 처리 중 ${i+1}/${total}: ${c.name.slice(0,28)}`);
    if(c.thumbUrl){ try{ imgMap[c.id]=await toB64(c.thumbUrl); }catch(_){} }
    await sleep(15);
  }

  setProg(85,'리포트 생성 중...');
  await sleep(60);

  const ts=new Date().toISOString().slice(0,16).replace('T',' ');
  const rows=list.map((c,i)=>{
    const img=imgMap[c.id]?`<img src="${imgMap[c.id]}" style="width:90px;height:90px;object-fit:cover;border-radius:6px;display:block;">`:'<div style="width:90px;height:90px;background:#eee;border-radius:6px;display:flex;align-items:center;justify-content:center;font-size:22px;">'+(c.type==='image'?'🖼':'🎬')+'</div>';
    const bg=i%2===0?'#ffffff':'#f7f8fc';
    return `<tr style="background:${bg}">
      <td style="padding:10px;text-align:center;vertical-align:middle;">${img}</td>
      <td style="padding:10px;vertical-align:middle;font-size:12px;color:#444;">${c.campName||''}</td>
      <td style="padding:10px;vertical-align:middle;font-size:12px;color:#444;">${c.adsetName||''}</td>
      <td style="padding:10px;vertical-align:middle;font-size:12px;font-weight:600;color:#111;">${c.name||''}</td>
      <td style="padding:10px;vertical-align:middle;font-size:11px;color:#666;text-align:center;">${c.type==='image'?'이미지':'영상'}</td>
      <td style="padding:10px;vertical-align:middle;font-size:11px;color:#666;text-align:center;">${c.type==='image'?(c.w&&c.h?c.w+'×'+c.h:''):(c.duration||'')}</td>
      <td style="padding:10px;vertical-align:middle;font-size:11px;color:#888;text-align:center;">${fmtDate(c.created)}</td>
    </tr>`;
  }).join('');

  const html=`<!DOCTYPE html><html lang="ko"><head><meta charset="UTF-8">
<title>Meta Creative Report ${ts}</title>
<style>
  body{font-family:'Apple SD Gothic Neo',Arial,sans-serif;background:#f0f2f7;margin:0;padding:24px;}
  .wrap{max-width:1200px;margin:0 auto;}
  h1{font-size:20px;color:#1a1a2e;margin-bottom:4px;}
  .sub{font-size:12px;color:#888;margin-bottom:20px;}
  table{width:100%;border-collapse:collapse;background:#fff;border-radius:10px;overflow:hidden;box-shadow:0 2px 12px rgba(0,0,0,.08);}
  th{background:#1e1e2e;color:#c9d1f5;padding:12px 10px;font-size:11px;font-weight:600;text-align:left;letter-spacing:.05em;text-transform:uppercase;}
  th:first-child{text-align:center;width:110px;}
  td{border-bottom:1px solid #eef0f6;}
  tr:last-child td{border-bottom:none;}
  tr:hover{background:#f0f4ff!important;}
</style></head><body>
<div class="wrap">
  <h1>📋 Meta Creative Report</h1>
  <div class="sub">생성일시: ${ts} · 소재 수: ${total}개</div>
  <table>
    <thead><tr>
      <th>미리보기</th><th>캠페인명</th><th>광고 세트명</th><th>소재명</th><th>타입</th><th>해상도</th><th>업로드 날짜</th>
    </tr></thead>
    <tbody>${rows}</tbody>
  </table>
</div></body></html>`;

  const blob=new Blob([html],{type:'text/html;charset=utf-8'});
  const a=document.createElement('a');
  a.href=URL.createObjectURL(blob);
  a.download=`meta_creatives_${ts.replace(' ','_').replace(':','-')}.html`;
  a.click();

  setProg(100,`✅ ${total}개 소재 완료!`);
  g('mt').textContent='✅ 다운로드 완료!';
  g('md').textContent=`${total}개 소재 리포트가 저장되었습니다. 브라우저에서 열거나 Excel로 열 수 있습니다.`;
  g('mcls').style.display='block';
}

async function toB64(url){
  return new Promise((res,rej)=>{
    const img=new Image(); img.crossOrigin='anonymous';
    img.onload=()=>{
      const cv=document.createElement('canvas');
      const mx=100, r=Math.min(mx/img.width,mx/img.height,1);
      cv.width=Math.round(img.width*r); cv.height=Math.round(img.height*r);
      cv.getContext('2d').drawImage(img,0,0,cv.width,cv.height);
      res(cv.toDataURL('image/jpeg',.82));
    };
    img.onerror=rej; img.src=url;
  });
}

function fmtDate(iso){if(!iso)return'';try{return new Date(iso).toISOString().slice(0,10);}catch{return iso.slice(0,10)||'';}}
function sleep(ms){return new Promise(r=>setTimeout(r,ms));}
async function api(path,tok){
  const sep=path.includes('?')?'&':'?';
  const r=await fetch(`https://graph.facebook.com/v23.0${path}${sep}access_token=${tok}`);
  const d=await r.json(); if(d.error) throw new Error(d.error.message); return d;
}
async function apiAll(path,tok){
  let all=[],url=`https://graph.facebook.com/v23.0${path}${(path.includes('?')?'&':'?')}access_token=${tok}`;
  while(url){
    const r=await fetch(url);
    const d=await r.json();
    if(d.error) throw new Error(d.error.message);
    all=all.concat(d.data||[]);
    url=d.paging?.next||null;
  }
  return all;
}
function setDot(cls,msg){g('dot').className='dot '+cls;g('stxt').textContent=msg;}
function setIcon(id,v){const el=g(id);el.innerHTML=v==='spin'?'<span class="sp-i"></span>':v;}
function sc(s){return s==='ACTIVE'?'sa':s==='PAUSED'?'sp':'so';}
function e(s){return encodeURIComponent(s);} function d(s){return decodeURIComponent(s);}
const g=id=>document.getElementById(id), W=window;
